<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Plate & Frame — Clarisse Kasandra Asignacion</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root {
  --sage: #6b7c5e;
  --sage-light: #8fa37d;
  --sage-dark: #3d4a35;
  --cream: #f4f1ea;
  --cream-dark: #e8e3d8;
  --olive: #a8b89a;
  --forest: #2d3a26;
  --muted: #7a8b6f;
  --line: #c4cebc;
  --white: #fafaf8;
}
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--forest);
  font-family: 'Lato', sans-serif;
  font-weight: 300;
}
/* ── BOOK WRAPPER ── */
.scene {
  width: 100vw; height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  perspective: 2200px;
  background: radial-gradient(ellipse at center, #3d4a35 0%, #1a2216 100%);
}
.book {
  position: relative;
  width: min(900px, 90vw);
  height: min(600px, 85vh);
  transform-style: preserve-3d;
}
/* ── PAGE BASE ── */
.page {
  position: absolute;
  width: 50%;
  height: 100%;
  top: 0;
  transform-origin: left center;
  transform-style: preserve-3d;
  transition: transform 1.1s cubic-bezier(.645,.045,.355,1.000);
  cursor: pointer;
}
.page .front, .page .back {
  position: absolute;
  width: 100%; height: 100%;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  overflow: hidden;
  border-radius: 0 4px 4px 0;
}
.page .back {
  transform: rotateY(180deg);
  border-radius: 4px 0 0 4px;
}
/* turned page */
.page.turned {
  transform: rotateY(-180deg);
  transform-origin: left center;
}
/* page spine shadow */
.page::after {
  content:'';
  position: absolute;
  top: 0; right: 0;
  width: 6px; height: 100%;
  background: linear-gradient(to right, rgba(0,0,0,0.18), transparent);
  pointer-events: none;
  z-index: 10;
}
/* ── STATIC HALVES ── */
.left-cover, .right-cover {
  position: absolute;
  width: 50%;
  height: 100%;
  top: 0;
  overflow: hidden;
}
.left-cover { left: 0; border-radius: 4px 0 0 4px; z-index: 0; }
.right-cover { right: 0; border-radius: 0 4px 4px 0; z-index: 0; }
/* ── CONTENT STYLES ── */
/* FRONT COVER */
.cover-front {
  background: linear-gradient(145deg, var(--forest) 0%, #2a3822 60%, var(--sage-dark) 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 2.5rem;
  position: relative;
  color: var(--cream);
  text-align: center;
  height: 100%;
}
.cover-front::before {
  content:'';
  position:absolute; inset:20px;
  border: 1px solid rgba(168,184,154,0.3);
  pointer-events:none;
}
.cover-front::after {
  content:'';
  position:absolute; inset:26px;
  border: 1px solid rgba(168,184,154,0.12);
  pointer-events:none;
}
.cf-tag { font-size:.58rem; letter-spacing:.22em; text-transform:uppercase; color:var(--olive); margin-bottom:2rem; }
.cf-title { font-family:'Playfair Display',serif; font-size:clamp(2rem,4vw,3.2rem); font-weight:400; line-height:1.1; letter-spacing:.04em; }
.cf-title em { display:block; font-style:italic; color:var(--sage-light); }
.cf-rule { width:40px; height:1px; background:var(--olive); margin:1.5rem auto; }
.cf-sub { font-size:.65rem; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); }
.cf-author { position:absolute; bottom:2rem; font-size:.62rem; letter-spacing:.14em; text-transform:uppercase; color:rgba(168,184,154,0.6); }
/* BACK COVER */
.cover-back {
  background: var(--sage-dark);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:2.5rem;
  color:var(--cream);
  text-align:center;
  height:100%;
  position:relative;
}
.cover-back::before {
  content:'';
  position:absolute; inset:20px;
  border:1px solid rgba(168,184,154,0.2);
  pointer-events:none;
}
.cb-quote { font-family:'Playfair Display',serif; font-style:italic; font-size:1rem; line-height:1.8; color:var(--cream-dark); max-width:24ch; margin-bottom:2rem; }
.cb-name { font-size:.62rem; letter-spacing:.2em; text-transform:uppercase; color:var(--sage-light); }
.cb-barcode { margin-top:2rem; opacity:.4; font-size:.5rem; letter-spacing:.3em; text-transform:uppercase; color:var(--olive); }
/* INNER PAGES */
.page-inner {
  background: var(--white);
  height:100%;
  display:flex;
  flex-direction:column;
  position:relative;
}
.page-inner.dark { background: var(--forest); color: var(--cream); }
.page-inner.sage-bg { background: var(--cream-dark); }
/* photo full bleed */
.photo-full { width:100%; height:65%; object-fit:cover; display:block; filter:saturate(0.9); }
.photo-half { width:100%; height:100%; object-fit:cover; display:block; filter:saturate(0.9); }
.page-text { padding:1.4rem 1.6rem; flex:1; display:flex; flex-direction:column; justify-content:center; }
.page-number { font-size:.55rem; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-bottom:.6rem; }
.page-title { font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:400; color:var(--forest); margin-bottom:.5rem; line-height:1.2; }
.page-inner.dark .page-title { color:var(--olive); }
.page-desc { font-size:.7rem; line-height:1.75; color:#666; letter-spacing:.01em; }
.page-inner.dark .page-desc { color:rgba(244,241,234,0.65); }
/* spread: left text, right photo */
.spread-text { padding:2rem; display:flex; flex-direction:column; justify-content:center; background:var(--cream); height:100%; }
.spread-text .page-number { color:var(--muted); }
.spread-text .page-title { font-family:'Playfair Display',serif; font-size:1.5rem; line-height:1.2; color:var(--forest); margin-bottom:.8rem; }
.spread-text .page-desc { font-size:.72rem; line-height:1.8; color:#5a5a5a; }
.spread-text .page-author { margin-top:auto; font-size:.58rem; letter-spacing:.15em; text-transform:uppercase; color:var(--sage); border-top:1px solid var(--line); padding-top:.8rem; }
/* chapter intro page */
.chapter-page { background:var(--sage); height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem; text-align:center; }
.chapter-page .ch-num { font-family:'Playfair Display',serif; font-size:3.5rem; color:rgba(244,241,234,.15); line-height:1; }
.chapter-page .ch-title { font-family:'Playfair Display',serif; font-style:italic; font-size:1.4rem; color:var(--cream); margin-top:.5rem; }
.chapter-page .ch-rule { width:30px; height:1px; background:rgba(244,241,234,.4); margin:1rem auto; }
.chapter-page .ch-sub { font-size:.6rem; letter-spacing:.18em; text-transform:uppercase; color:rgba(244,241,234,.5); }
/* colophon page */
.colophon { background:var(--cream-dark); height:100%; padding:2.5rem 2rem; display:flex; flex-direction:column; }
.colophon .col-title { font-family:'Playfair Display',serif; font-size:1.8rem; color:var(--forest); margin-bottom:.4rem; }
.colophon .col-sub { font-size:.62rem; letter-spacing:.18em; text-transform:uppercase; color:var(--sage); margin-bottom:1.5rem; }
.colophon .col-body { font-size:.7rem; line-height:1.85; color:#5a5a5a; flex:1; }
.colophon .col-credit { margin-top:auto; border-top:1px solid var(--line); padding-top:1rem; font-size:.6rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); }
.colophon .col-name { font-family:'Playfair Display',serif; font-style:italic; font-size:1.1rem; color:var(--sage-dark); letter-spacing:.02em; display:block; margin-top:.2rem; }
/* nav arrows */
.nav {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 1.5rem;
  z-index: 999;
}
.nav button {
  background: rgba(244,241,234,0.1);
  border: 1px solid rgba(168,184,154,0.4);
  color: var(--cream);
  font-size: .65rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  padding: .6rem 1.4rem;
  cursor: pointer;
  transition: background .3s, border-color .3s;
  font-family: 'Lato', sans-serif;
  border-radius: 2px;
}
.nav button:hover { background: rgba(168,184,154,0.2); border-color: var(--olive); }
.nav button:disabled { opacity: .25; cursor: default; }
.page-indicator {
  position: fixed;
  top: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  font-size: .58rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: rgba(244,241,234,.4);
  z-index: 999;
}
/* shadow on book */
.book-shadow {
  position:absolute;
  bottom:-30px; left:5%; right:5%;
  height:40px;
  background:radial-gradient(ellipse, rgba(0,0,0,0.5) 0%, transparent 70%);
  filter:blur(8px);
  z-index:-1;
}
/* spine */
.spine {
  position:absolute;
  left:50%;
  top:0; bottom:0;
  width:4px;
  transform:translateX(-50%);
  background:linear-gradient(to right, rgba(0,0,0,0.3), rgba(0,0,0,0.05), rgba(0,0,0,0.3));
  z-index:100;
  pointer-events:none;
}
</style>
</head>

<div class="page-indicator" id="indicator">Cover</div>
<div class="scene">
  <div class="book" id="book">
    <!-- Static left cover half (always visible as base) -->
    <div class="left-cover" id="left-cover">
      <!-- filled by JS -->
    </div>
    <div class="right-cover" id="right-cover">
      <!-- filled by JS -->
    </div>
    <!-- Spine -->
    <div class="spine"></div>
    <!-- Shadow -->
    <div class="book-shadow"></div>
    <!-- PAGES (will be layered by JS z-index) -->
    <!-- page 1: front cover right / page 1 left back -->
    <!-- page 2: page 1 right / page 2 left back -->
    <!-- etc. -->
    <!-- We build 6 pages (12 sides) -->
  </div>
</div>
<div class="nav">
  <button id="prev" disabled>&#8592; Prev</button>

</div>

const labels = ["Cover", "Chapter 1", "Story — The Rest", "Amber Hour", "Fork & Bone", "Colophon", "Back Cover"];
// ── BUILD ──
const book = document.getElementById('book');
const leftCover = document.getElementById('left-cover');
const rightCover = document.getElementById('right-cover');
// Set static covers (always behind)
leftCover.innerHTML = spreads[0].left;
rightCover.innerHTML = spreads[0].right;
// Create flippable pages
// Each page: front shows right-side of spread[i], back shows left-side of spread[i+1]
// Page i flips to reveal spread[i+1]
const NUM_PAGES = spreads.length - 1; // 6 pages
const pages = [];
for (let i = 0; i < NUM_PAGES; i++) {
  const pg = document.createElement('div');
  pg.className = 'page';
  pg.style.left = '50%';
  pg.style.zIndex = NUM_PAGES - i;
  const front = document.createElement('div');
  front.className = 'front';
  front.innerHTML = spreads[i].right;
  const back = document.createElement('div');
  back.className = 'back';
  back.innerHTML = spreads[i+1].left;
  pg.appendChild(front);
  pg.appendChild(back);
  book.appendChild(pg);
  pages.push(pg);
}
// ── STATE ──
let current = 0; // how many pages are turned
function update() {
  pages.forEach((pg, i) => {
    if (i < current) {
      pg.classList.add('turned');
      pg.style.zIndex = i + 1;
    } else {
      pg.classList.remove('turned');
      pg.style.zIndex = NUM_PAGES - i;
    }
  });
  // Update static left/right base
  const leftSpread = current < NUM_PAGES ? spreads[current] : spreads[NUM_PAGES];
  leftCover.innerHTML = leftSpread.left;
  rightCover.innerHTML = leftSpread.right;
  document.getElementById('prev').disabled = current === 0;
  document.getElementById('next').disabled = current === NUM_PAGES;
  document.getElementById('indicator').textContent = labels[Math.min(current, labels.length-1)];
}
document.getElementById('next').onclick = () => { if (current < NUM_PAGES) { current++; update(); } };
document.getElementById('prev').onclick = () => { if (current > 0) { current--; update(); } };
// click right side to go next
document.querySelector('.scene').addEventListener('click', e => {
  const bk = book.getBoundingClientRect();
  const mid = bk.left + bk.width / 2;
  if (e.clientX > mid && current < NUM_PAGES) { current++; update(); }
  else if (e.clientX < mid && current > 0) { current--; update(); }
});
update();
</script>
